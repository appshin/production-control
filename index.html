<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생산 관리 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header-info {
            display: flex;
            gap: 30px;
            font-size: 14px;
        }

        .header-info div {
            display: flex;
            flex-direction: column;
        }

        .header-info label {
            color: #999;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-info span {
            color: #333;
            font-weight: 700;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .setup-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .setup-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .setup-box h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #333;
        }

        .setup-box p {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 13px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .button-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-camera {
            background: #0d6efd;
            color: white;
            flex: 0.4;
        }

        .btn-camera:hover {
            background: #0b5ed7;
        }

        .status-box {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 12px;
            color: #2e7d32;
        }

        .start-btn-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        .start-btn-section button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
        }

        .dashboard-board {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .dashboard-board h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        tbody tr:hover {
            background: #f0f4ff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.waiting {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.checking {
            background: #cfe2ff;
            color: #084298;
        }

        .status-badge.working {
            background: #fff3e0;
            color: #ff9800;
        }

        .status-badge.pending {
            background: #ffebee;
            color: #c62828;
        }

        .status-badge.completed {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
        }

        .btn-check {
            background: #0d6efd;
            color: white;
        }

        .btn-input-qty {
            background: #28a745;
            color: white;
        }

        .btn-approve {
            background: #4caf50;
            color: white;
        }

        .btn-reject {
            background: #f44336;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-footer button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        #scanner {
            width: 100%;
            max-width: 400px;
            margin: 15px auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #000;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .popup-message {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1565c0;
            font-weight: 600;
            font-size: 14px;
        }

        .empty-msg {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        @media (max-width: 1024px) {
            .setup-section {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .setup-section {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 생산 관리 대시보드</h1>
            <div class="header-info">
                <div>
                    <label>현재 시간</label>
                    <span id="currentTime">00:00:00</span>
                </div>
                <div>
                    <label>작업자</label>
                    <span id="workerName">미설정</span>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('setup')">👷 작업 설정</button>
            <button class="tab-btn" onclick="switchTab('quality')">🔬 품질검사</button>
            <button class="tab-btn" onclick="switchTab('production')">📊 생산현황</button>
            <button class="tab-btn" onclick="switchTab('approval')">✅ 승인관리</button>
        </div>

        <!-- 작업 설정 탭 -->
        <div id="setup" class="tab-content active">
            <div class="setup-section">
                <div class="setup-box">
                    <h3>👤 작업자 정보</h3>
                    <div class="input-group">
                        <label>작업자 이름</label>
                        <div class="button-group">
                            <input type="text" id="workerInput" placeholder="이름 입력">
                            <button class="btn-camera" onclick="startWorkerScanner()">📷</button>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="setWorkerName()" style="width:100%;">저장</button>
                    <div id="workerStatus"></div>
                </div>

                <div class="setup-box">
                    <h3>🏢 설비 정보</h3>
                    <div class="input-group">
                        <label>설비 ID</label>
                        <div class="button-group">
                            <input type="text" id="equipmentInput" placeholder="설비 ID">
                            <button class="btn-camera" onclick="startEquipmentScanner()">📷</button>
                        </div>
                    </div>
                    <div id="equipmentStatus"></div>
                </div>

                <div class="setup-box">
                    <h3>📋 작업표준서</h3>
                    <div class="input-group">
                        <label>작업표준서 ID</label>
                        <div class="button-group">
                            <input type="text" id="standardInput" placeholder="표준서 ID">
                            <button class="btn-camera" onclick="startStandardScanner()">📷</button>
                        </div>
                    </div>
                    <div id="standardStatus"></div>
                </div>
            </div>

            <div id="startBtnContainer" style="display:none;" class="start-btn-section">
                <button class="btn-primary" onclick="startWork()">🚀 작업 시작</button>
            </div>
        </div>

        <!-- 품질검사 탭 -->
        <div id="quality" class="tab-content">
            <div class="dashboard-board">
                <h2>🔬 초품검사 대기</h2>
                <table>
                    <thead>
                        <tr>
                            <th>설비</th>
                            <th>작업자</th>
                            <th>표준서</th>
                            <th>상태</th>
                            <th>조치</th>
                        </tr>
                    </thead>
                    <tbody id="qualityTable">
                        <tr><td colspan="5" class="empty-msg">데이터 로드 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 생산현황 탭 -->
        <div id="production" class="tab-content">
            <div class="dashboard-board">
                <h2>📊 생산 작업 현황</h2>
                <table>
                    <thead>
                        <tr>
                            <th>설비</th>
                            <th>작업자</th>
                            <th>표준서</th>
                            <th>생산량</th>
                            <th>품질담당</th>
                            <th>상태</th>
                            <th>조치</th>
                        </tr>
                    </thead>
                    <tbody id="productionTable">
                        <tr><td colspan="7" class="empty-msg">데이터 로드 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 승인관리 탭 -->
        <div id="approval" class="tab-content">
            <div class="dashboard-board">
                <h2>✅ 승인 관리</h2>
                <table>
                    <thead>
                        <tr>
                            <th>설비</th>
                            <th>작업자</th>
                            <th>표준서</th>
                            <th>생산량</th>
                            <th>품질담당</th>
                            <th>상태</th>
                            <th>조치</th>
                        </tr>
                    </thead>
                    <tbody id="approvalTable">
                        <tr><td colspan="7" class="empty-msg">데이터 로드 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- QR 스캔 모달 -->
    <div id="scannerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">📷 QR 코드 스캔</div>
            <div class="modal-body">
                <video id="scanner" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" style="background:#f5f5f5; color:#333;" onclick="closeScanner()">닫기</button>
            </div>
        </div>
    </div>

    <!-- 작업 시작 팝업 -->
    <div id="startPopup" class="modal">
        <div class="modal-content">
            <div class="modal-header">🚀 작업 시작 확인</div>
            <div class="modal-body">
                <div class="popup-message">⚠️ 품질부서에서 초품검사를 받으세요!</div>
                <div style="background:#f5f5f5; padding:15px; border-radius:8px;">
                    <div><strong>작업자:</strong> <span id="popWorker"></span></div>
                    <div><strong>설비:</strong> <span id="popEquipment"></span></div>
                    <div><strong>표준서:</strong> <span id="popStandard"></span></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" style="background:#f5f5f5; color:#333;" onclick="closeStartPopup()">닫기</button>
                <button class="btn-primary" onclick="confirmStart()">확인</button>
            </div>
        </div>
    </div>

    <!-- 품질검사 모달 -->
    <div id="qualityModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">🔬 초품검사 입력</div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="input-group">
                        <label>설비</label>
                        <input type="text" id="qcEquip" readonly style="background:#f5f5f5;">
                    </div>
                    <div class="input-group">
                        <label>작업자</label>
                        <input type="text" id="qcWorker" readonly style="background:#f5f5f5;">
                    </div>
                </div>
                <div class="input-group">
                    <label>품질담당자</label>
                    <input type="text" id="qcName" placeholder="이름">
                </div>
                <div class="input-group">
                    <label>검사항목1</label>
                    <input type="text" id="qcItem1" placeholder="값">
                </div>
                <div class="input-group">
                    <label>검사항목2</label>
                    <input type="text" id="qcItem2" placeholder="값">
                </div>
                <div class="input-group">
                    <label>검사항목3</label>
                    <input type="text" id="qcItem3" placeholder="값">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" style="background:#f5f5f5; color:#333;" onclick="closeQuality()">취소</button>
                <button class="btn-primary" onclick="approveQuality()">✅ 양품 승인</button>
            </div>
        </div>
    </div>

    <!-- 수량 입력 모달 -->
    <div id="qtyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">📊 생산 수량 입력</div>
            <div class="modal-body">
                <div class="input-group">
                    <label>설비</label>
                    <input type="text" id="qtyEquip" readonly style="background:#f5f5f5;">
                </div>
                <div class="input-group">
                    <label>생산 수량</label>
                    <input type="number" id="qtyVal" placeholder="수량" min="1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" style="background:#f5f5f5; color:#333;" onclick="closeQty()">취소</button>
                <button class="btn-primary" onclick="submitQty()">✅ 입력</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            worker: null,
            equipment: null,
            standard: null,
            jobs: []
        };

        let scanType = null;
        let scanStream = null;
        let qcJobId = null;
        let qtyJobId = null;

        function saveState() {
            localStorage.setItem('prodState', JSON.stringify(state));
            refreshTables();
        }

        function loadState() {
            const saved = localStorage.getItem('prodState');
            if (saved) state = JSON.parse(saved);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            event.target.classList.add('active');
            setTimeout(() => refreshTables(), 100);
        }

        function setWorkerName() {
            const name = document.getElementById('workerInput').value.trim();
            if (!name) return alert('이름을 입력하세요');
            state.worker = name;
            document.getElementById('workerName').textContent = name;
            document.getElementById('workerInput').value = '';
            document.getElementById('workerStatus').innerHTML = '<div class="status-box">✓ 저장됨</div>';
            checkShowBtn();
        }

        function startWorkerScanner() { scanType = 'worker'; openScanner(); }
        function startEquipmentScanner() { scanType = 'equipment'; openScanner(); }
        function startStandardScanner() { scanType = 'standard'; openScanner(); }

        function openScanner() {
            document.getElementById('scannerModal').classList.add('active');
            setTimeout(() => startCam(), 100);
        }

        async function startCam() {
            try {
                scanStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                document.getElementById('scanner').srcObject = scanStream;
                scanQR();
            } catch (e) {
                alert('카메라 권한 필요');
                closeScanner();
            }
        }

        function scanQR() {
            const video = document.getElementById('scanner');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            if (video.videoWidth === 0) {
                setTimeout(scanQR, 100);
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(data.data, data.width, data.height);

            if (code) {
                processCode(code.data);
                closeScanner();
            } else {
                setTimeout(scanQR, 100);
            }
        }

        function processCode(data) {
            if (scanType === 'worker') {
                document.getElementById('workerInput').value = data;
            } else if (scanType === 'equipment') {
                state.equipment = data;
                document.getElementById('equipmentInput').value = data;
                document.getElementById('equipmentStatus').innerHTML = '<div class="status-box">✓ 인식됨</div>';
                checkShowBtn();
            } else if (scanType === 'standard') {
                state.standard = data;
                document.getElementById('standardInput').value = data;
                document.getElementById('standardStatus').innerHTML = '<div class="status-box">✓ 인식됨</div>';
                checkShowBtn();
            }
        }

        function closeScanner() {
            if (scanStream) scanStream.getTracks().forEach(t => t.stop());
            document.getElementById('scannerModal').classList.remove('active');
        }

        function checkShowBtn() {
            if (state.worker && state.equipment && state.standard) {
                document.getElementById('startBtnContainer').style.display = 'block';
            }
        }

        function startWork() {
            document.getElementById('popWorker').textContent = state.worker;
            document.getElementById('popEquipment').textContent = state.equipment;
            document.getElementById('popStandard').textContent = state.standard;
            document.getElementById('startPopup').classList.add('active');
        }

        function closeStartPopup() {
            document.getElementById('startPopup').classList.remove('active');
        }

        function confirmStart() {
            const job = {
                id: Date.now(),
                equipment: state.equipment,
                standard: state.standard,
                worker: state.worker,
                quantity: 0,
                status: 'waiting_quality',
                inspector: null,
                startTime: new Date().toLocaleString('ko-KR')
            };
            state.jobs.push(job);
            state.equipment = null;
            state.standard = null;
            document.getElementById('equipmentInput').value = '';
            document.getElementById('standardInput').value = '';
            document.getElementById('equipmentStatus').innerHTML = '';
            document.getElementById('standardStatus').innerHTML = '';
            document.getElementById('startBtnContainer').style.display = 'none';
            saveState();
            closeStartPopup();
            alert('작업 시작!');
        }

        function openQualityModal(jobId) {
            const job = state.jobs.find(j => j.id === jobId);
            qcJobId = jobId;
            document.getElementById('qcEquip').value = job.equipment;
            document.getElementById('qcWorker').value = job.worker;
            document.getElementById('qualityModal').classList.add('active');
        }

        function closeQuality() {
            document.getElementById('qualityModal').classList.remove('active');
        }

        function approveQuality() {
            const name = document.getElementById('qcName').value.trim();
            if (!name) return alert('담당자명 입력');
            const job = state.jobs.find(j => j.id === qcJobId);
            job.status = 'working';
            job.inspector = name;
            saveState();
            closeQuality();
            alert('양품 승인!');
        }

        function openQtyModal(jobId) {
            const job = state.jobs.find(j => j.id === jobId);
            qtyJobId = jobId;
            document.getElementById('qtyEquip').value = job.equipment;
            document.getElementById('qtyModal').classList.add('active');
        }

        function closeQty() {
            document.getElementById('qtyModal').classList.remove('active');
        }

        function submitQty() {
            const qty = parseInt(document.getElementById('qtyVal').value);
            if (!qty) return alert('수량 입력');
            const job = state.jobs.find(j => j.id === qtyJobId);
            job.quantity = qty;
            job.status = 'pending';
            saveState();
            closeQty();
            alert('수량 입력!');
        }

        function approveJob(jobId) {
            const job = state.jobs.find(j => j.id === jobId);
            job.status = 'approved';
            saveState();
            alert('승인!');
        }

        function rejectJob(jobId) {
            const job = state.jobs.find(j => j.id === jobId);
            job.status = 'rejected';
            saveState();
            alert('반려!');
        }

        function getStatusText(status) {
            const map = {
                'waiting_quality': '검사대기',
                'working': '검사승인',
                'pending': '승인대기',
                'approved': '완료'
            };
            return map[status] || status;
        }

        function refreshTables() {
            // 품질검사 테이블
            const qTable = document.getElementById('qualityTable');
            const qJobs = state.jobs.filter(j => j.status === 'waiting_quality');
            if (qJobs.length === 0) {
                qTable.innerHTML = '<tr><td colspan="5" class="empty-msg">검사 대기 작업 없음</td></tr>';
            } else {
                qTable.innerHTML = qJobs.map(j => `
                    <tr>
                        <td>${j.equipment}</td>
                        <td>${j.worker}</td>
                        <td>${j.standard}</td>
                        <td><span class="status-badge checking">대기</span></td>
                        <td><button class="btn-action btn-check" onclick="openQualityModal(${j.id})">검사</button></td>
                    </tr>
                `).join('');
            }

            // 생산현황 테이블
            const pTable = document.getElementById('productionTable');
            const pJobs = state.jobs.filter(j => j.status !== 'rejected');
            if (pJobs.length === 0) {
                pTable.innerHTML = '<tr><td colspan="7" class="empty-msg">작업 기록 없음</td></tr>';
            } else {
                pTable.innerHTML = pJobs.map(j => `
                    <tr>
                        <td>${j.equipment}</td>
                        <td>${j.worker}</td>
                        <td>${j.standard}</td>
                        <td>${j.quantity}</td>
                        <td>${j.inspector || '-'}</td>
                        <td><span class="status-badge ${getStatusClass(j.status)}">${getStatusText(j.status)}</span></td>
                        <td>${j.status === 'working' ? `<button class="btn-action btn-input-qty" onclick="openQtyModal(${j.id})">수량</button>` : ''}</td>
                    </tr>
                `).join('');
            }

            // 승인관리 테이블
            const aTable = document.getElementById('approvalTable');
            const aJobs = state.jobs.filter(j => j.status === 'pending');
            if (aJobs.length === 0) {
                aTable.innerHTML = '<tr><td colspan="7" class="empty-msg">승인 대기 없음</td></tr>';
            } else {
                aTable.innerHTML = aJobs.map(j => `
                    <tr>
                        <td>${j.equipment}</td>
                        <td>${j.worker}</td>
                        <td>${j.standard}</td>
                        <td>${j.quantity}</td>
                        <td>${j.inspector}</td>
                        <td><span class="status-badge pending">대기</span></td>
                        <td>
                            <button class="btn-action btn-approve" onclick="approveJob(${j.id})">승인</button>
                            <button class="btn-action btn-reject" onclick="rejectJob(${j.id})">반려</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function getStatusClass(status) {
            const map = {
                'waiting_quality': 'checking',
                'working': 'working',
                'pending': 'pending',
                'approved': 'completed'
            };
            return map[status] || 'waiting';
        }

        function updateTime() {
            const now = new Date().toLocaleTimeString('ko-KR');
            document.getElementById('currentTime').textContent = now;
        }

        setInterval(updateTime, 1000);
        setInterval(() => {
            loadState();
            refreshTables();
        }, 500);

        loadState();
        if (state.worker) document.getElementById('workerName').textContent = state.worker;
        refreshTables();
    </script>
</body>
</html>
